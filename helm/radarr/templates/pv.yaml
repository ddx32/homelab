apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.name }}-config-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  nfs:
    path: {{ .Values.nfs.paths.config }}
    server: {{ .Values.nfs.server }}

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.name }}-media-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  nfs:
    path: {{ .Values.nfs.paths.media }}
    server: {{ .Values.nfs.server }}
