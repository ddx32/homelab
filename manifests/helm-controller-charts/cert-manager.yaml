apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: cert-manager
  namespace: kube-system
spec:
  repo: https://charts.jetstack.io
  chart: cert-manager
  targetNamespace: cert-manager
  # 1.19.x is the newest available; verified working through k8s 1.36 (webhook
  # admits resources). Upgraded one minor at a time from 1.13.2
  # (1.14.7 -> 1.15.5 -> 1.16.5 -> 1.17.4 -> 1.18.6 -> 1.19.6).
  version: v1.19.6
  valuesContent: |-
    # installCRDs (used through 1.14) was replaced by crds.* in 1.15+.
    crds:
      enabled: true
      keep: true
